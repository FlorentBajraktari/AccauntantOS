        <script>
            (function () {
                function enforceBadge() {
                    var badge = document.getElementById("emergent-badge");
                    if (!badge) return;
                    // Ensure the badge links to florentdev.online
                    badge.setAttribute("href", "https://www.florentdev.online");
                    badge.setAttribute("target", "_blank");
                    badge.setAttribute("rel", "noopener noreferrer");
                    badge.style.cursor = "pointer";
                    // Remove any logo/svg injected by external scripts
                    var svgs = badge.querySelectorAll("svg, img");
                    svgs.forEach(function (el) { el.remove(); });
                    // Force our text
                    var p = badge.querySelector("p");
                    if (!p) {
                        p = document.createElement("p");
                        badge.appendChild(p);
                    }
                    if (p.getAttribute("data-heart") !== "1") {
                        p.setAttribute("data-heart", "1");
                        p.style.cssText =
                            "color:#FFF !important;font-family:'Inter',sans-serif !important;font-size:13px !important;font-weight:600 !important;line-height:20px !important;margin:0 !important;white-space:nowrap !important;";
                        p.innerHTML = 'Made with <span style="color:#ff4d6d !important;">&#10084;</span>';
                    }
                    badge.style.width = "auto";
                }
                enforceBadge();
                document.addEventListener("DOMContentLoaded", enforceBadge);
                setInterval(enforceBadge, 500);
                if (window.MutationObserver) {
                    new MutationObserver(enforceBadge).observe(document.documentElement, { childList: true, subtree: true });
                }
            })();
        </script>
