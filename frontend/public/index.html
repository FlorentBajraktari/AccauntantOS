<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AccountantOS — modern accounting operations platform for bookkeeping firms." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
    <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
    <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
    <title>AccountantOS | Accounting Operations Platform</title>
    <script>window.addEventListener("error", function (e) { if (e.error instanceof DOMException && e.error.name === "DataCloneError" && e.message && e.message.includes("PerformanceServerTiming")) { e.stopImmediatePropagation(); e.preventDefault() } }, true);</script>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <a id="made-with-love-badge" href="https://www.florentdev.online" target="_blank" rel="noopener noreferrer">Made
        with Love <span class="made-with-love-heart">❤️</span></a>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <style>
        #made-with-love-badge {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, #0b1220 0%, #1e293b 100%);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 4px 14px rgba(2, 6, 23, 0.25);
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.2px;
            line-height: 1;
            opacity: 0.92;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
            text-decoration: none;
            cursor: pointer;
        }

        #made-with-love-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
            opacity: 1;
        }

        .made-with-love-heart {
            display: inline-block;
            margin-left: 4px;
            transform-origin: center;
            animation: made-with-love-beat 1.5s ease-in-out infinite;
        }

        @keyframes made-with-love-beat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.28);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.16);
            }

            60% {
                transform: scale(1);
            }
        }
    </style>
</body>

</html>
